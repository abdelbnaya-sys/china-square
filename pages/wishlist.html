<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mes Favoris - China Square</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/components.css">
  <style>
    .wishlist-page { padding: 40px 0; }
    .wishlist-page h1 { margin-bottom: 30px; }
    .wishlist-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
    .wishlist-empty { text-align: center; padding: 80px 20px; background: white; border-radius: 12px; }
    .wishlist-empty-icon { font-size: 4rem; margin-bottom: 20px; }
    .wishlist-empty h3 { margin-bottom: 10px; }
    .wishlist-empty p { color: #757575; margin-bottom: 20px; }
    @media (max-width: 1200px) { .wishlist-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 992px) { .wishlist-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 576px) { .wishlist-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-main">
      <div class="container">
        <div class="header-content">
          <a href="../index.html" class="logo">
            <span class="logo-icon">🛒</span>
            <span class="logo-text">
              <span class="logo-china">China</span>
              <span class="logo-square">Square</span>
            </span>
          </a>
          <div class="header-icons">
            <a href="cart.html" class="header-icon cart-icon">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
              <span class="icon-badge" id="cart-count">0</span>
            </a>
          </div>
        </div>
      </div>
    </div>
  </header>

  <main class="wishlist-page">
    <div class="container">
      <h1>❤️ Mes Favoris</h1>
      <div class="wishlist-grid" id="wishlist-items">
        <!-- Wishlist items will be rendered here -->
      </div>
      <div class="wishlist-empty" id="wishlist-empty" style="display: none;">
        <div class="wishlist-empty-icon">💝</div>
        <h3>Votre liste de favoris est vide</h3>
        <p>Ajoutez des produits que vous adorez!</p>
        <a href="products.html" class="btn btn-primary">Découvrir les produits</a>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>© 2025 China Square. Tous droits réservés.</p>
      </div>
    </div>
  </footer>

  <script src="../js/cart.js"></script>
  <script>
    // Wishlist functionality
    let wishlist = JSON.parse(localStorage.getItem('chinaSquare_wishlist')) || [];
    
    function updateWishlistDisplay() {
      const container = document.getElementById('wishlist-items');
      const emptyState = document.getElementById('wishlist-empty');
      const badge = document.getElementById('wishlist-count');
      
      if (badge) badge.textContent = wishlist.length;
      
      if (wishlist.length === 0) {
        container.style.display = 'none';
        emptyState.style.display = 'block';
        return;
      }
      
      container.style.display = 'grid';
      emptyState.style.display = 'none';
      
      container.innerHTML = wishlist.map(item => `
        <div class="product-card">
          <div class="product-image">
            <img src="${item.image}" alt="${item.name}">
            <button class="wishlist-btn active" onclick="removeFromWishlist(${item.id})">❤️</button>
          </div>
          <div class="product-info">
            <h3 class="product-title">${item.name}</h3>
            <div class="product-price"><span class="price-new">$${item.price.toFixed(2)}</span></div>
            <button class="btn btn-primary btn-block" onclick="addToCart(${item.id}, '${item.name}', ${item.price}); removeFromWishlist(${item.id});">Ajouter au panier</button>
          </div>
        </div>
      `).join('');
    }
    
    function removeFromWishlist(id) {
      wishlist = wishlist.filter(item => item.id !== id);
      localStorage.setItem('chinaSquare_wishlist', JSON.stringify(wishlist));
      updateWishlistDisplay();
      showToast('Retiré des favoris', 'info');
    }
    
    // Make toggleWishlist globally available
    function toggleWishlist(id) {
      const productCard = document.querySelector(`[data-product-id="${id}"]`);
      const name = productCard?.querySelector('.product-title')?.textContent || 'Produit';
      const priceEl = productCard?.querySelector('.price-new');
      const price = priceEl ? parseFloat(priceEl.textContent.replace('$', '')) : 9.99;
      const img = productCard?.querySelector('img')?.src || '';
      
      const existing = wishlist.find(item => item.id === id);
      if (existing) {
        removeFromWishlist(id);
      } else {
        wishlist.push({ id, name, price, image: img });
        localStorage.setItem('chinaSquare_wishlist', JSON.stringify(wishlist));
        showToast(`${name} ajouté aux favoris!`, 'success');
      }
      updateWishlistDisplay();
    }
    
    document.addEventListener('DOMContentLoaded', updateWishlistDisplay);
  </script>
</body>
</html>
