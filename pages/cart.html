<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mon Panier - China Square</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/components.css">
  <style>
    .cart-page { padding: 40px 0; }
    .cart-layout { display: grid; grid-template-columns: 1fr 350px; gap: 30px; }
    .cart-items { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .cart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid #e0e0e0; }
    .cart-header h2 { margin: 0; display: flex; align-items: center; gap: 10px; }
    .cart-clear { color: #DA291C; font-weight: 500; cursor: pointer; }
    .cart-empty { text-align: center; padding: 60px 20px; }
    .cart-empty-icon { font-size: 4rem; margin-bottom: 20px; }
    .cart-empty h3 { margin-bottom: 10px; }
    .cart-empty p { color: #757575; margin-bottom: 20px; }
    .cart-item { display: grid; grid-template-columns: 80px 1fr auto auto auto; gap: 20px; align-items: center; padding: 20px 0; border-bottom: 1px solid #f0f0f0; }
    .cart-item-image { width: 80px; height: 80px; border-radius: 8px; overflow: hidden; background: #f5f5f5; }
    .cart-item-image img { width: 100%; height: 100%; object-fit: cover; }
    .cart-item-info h4 { margin: 0 0 5px; font-size: 0.9375rem; }
    .cart-item-price { color: #757575; font-size: 0.875rem; margin: 0; }
    .cart-item-quantity { display: flex; align-items: center; gap: 10px; }
    .qty-btn { width: 32px; height: 32px; border: 1px solid #e0e0e0; border-radius: 6px; background: white; cursor: pointer; font-size: 1rem; transition: all 0.2s; }
    .qty-btn:hover { border-color: #DA291C; color: #DA291C; }
    .qty-value { font-weight: 600; min-width: 30px; text-align: center; }
    .cart-item-subtotal { font-size: 1.125rem; font-weight: 700; color: #DA291C; min-width: 80px; text-align: right; }
    .cart-item-remove { width: 36px; height: 36px; border: none; background: #f5f5f5; border-radius: 6px; cursor: pointer; color: #757575; transition: all 0.2s; }
    .cart-item-remove:hover { background: #DA291C; color: white; }
    .cart-summary { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); position: sticky; top: 120px; }
    .cart-summary h3 { margin: 0 0 20px; padding-bottom: 20px; border-bottom: 1px solid #e0e0e0; }
    .summary-row { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 0.9375rem; }
    .summary-row.total { font-size: 1.25rem; font-weight: 700; color: #DA291C; padding-top: 15px; border-top: 1px solid #e0e0e0; margin-top: 15px; }
    .summary-row.shipping-free { color: #4CAF50; }
    .promo-code { display: flex; gap: 10px; margin: 20px 0; }
    .promo-code input { flex: 1; padding: 10px 15px; border: 2px solid #e0e0e0; border-radius: 8px; outline: none; }
    .promo-code input:focus { border-color: #DA291C; }
    .promo-code button { padding: 10px 20px; background: #333; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
    .checkout-btn { width: 100%; padding: 16px; background: #DA291C; color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 20px; transition: all 0.2s; }
    .checkout-btn:hover { background: #B71C1C; transform: translateY(-2px); }
    .continue-shopping { display: block; text-align: center; margin-top: 15px; color: #757575; }
    .continue-shopping:hover { color: #DA291C; }
    .free-shipping-note { background: #FFF4CC; padding: 15px; border-radius: 8px; text-align: center; margin-bottom: 20px; font-size: 0.875rem; }
    .free-shipping-note strong { color: #DA291C; }
    @media (max-width: 992px) { .cart-layout { grid-template-columns: 1fr; } .cart-summary { position: static; } }
    @media (max-width: 768px) { .cart-item { grid-template-columns: 60px 1fr; gap: 15px; } .cart-item-quantity, .cart-item-subtotal, .cart-item-remove { grid-column: 2; } .cart-item-image { width: 60px; height: 60px; } }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-main">
      <div class="container">
        <div class="header-content">
          <a href="../index.html" class="logo">
            <span class="logo-icon">🛒</span>
            <span class="logo-text">
              <span class="logo-china">China</span>
              <span class="logo-square">Square</span>
            </span>
          </a>
          <div class="header-icons">
            <a href="wishlist.html" class="header-icon">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
              <span class="icon-badge" id="wishlist-count">0</span>
            </a>
            <a href="cart.html" class="header-icon cart-icon">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
              <span class="icon-badge" id="cart-count">0</span>
            </a>
          </div>
        </div>
      </div>
    </div>
  </header>

  <main class="cart-page">
    <div class="container">
      <h1 class="mb-lg">🛒 Mon Panier</h1>
      <div class="cart-layout">
        <div class="cart-items">
          <div class="cart-header">
            <h2><span id="cart-count-display">0</span> produits</h2>
            <span class="cart-clear" onclick="clearCart()">Vider le panier</span>
          </div>
          <div id="cart-items">
            <!-- Cart items will be rendered here -->
          </div>
        </div>
        <div class="cart-summary" id="cart-summary">
          <h3>Récapitulatif</h3>
          <div class="free-shipping-note">
            🚚 <strong>+39€</strong> pour livraison gratuite!
          </div>
          <div class="summary-row">
            <span>Sous-total</span>
            <span id="cart-subtotal">$0.00</span>
          </div>
          <div class="summary-row">
            <span>Livraison</span>
            <span id="cart-shipping">$5.99</span>
          </div>
          <div class="summary-row">
            <span>Code promo</span>
            <span>-</span>
          </div>
          <div class="summary-row total">
            <span>Total</span>
            <span id="cart-total">$0.00</span>
          </div>
          <div class="promo-code">
            <input type="text" placeholder="Code promo">
            <button>Appliquer</button>
          </div>
          <button class="checkout-btn">Passer commande</button>
          <a href="products.html" class="continue-shopping">← Continuer mes achats</a>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>© 2025 China Square. Tous droits réservés.</p>
      </div>
    </div>
  </footer>

  <script src="../js/cart.js"></script>
</body>
</html>
